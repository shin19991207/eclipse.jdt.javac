# Fast running checks for pull-requests

name: Pull-Request Checks
concurrency: 
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
  pull_request

jobs:
  check-merge-commits:
    name: Check for Merge Commits
    uses: eclipse-platform/eclipse.platform.releng.aggregator/.github/workflows/checkMergeCommits.yml@master
  check-compiles:
    name: Check if Code Compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Check if code compiles
        run: mvn --batch-mode --update-snapshots compile
  check-regressing-tests:
    name: Check for New Passes/Failures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Setup JBang
        uses: jbangdev/setup-jbang@312c53a4221283f9c8e4aa84d8261b82f0c680fb
      - name: Trust datho7561's Scripts
        run: jbang trust add https://gist.github.com/datho7561/
      - name: Run diffing script
        run: |
          set +e
          xvfb-run jbang https://gist.github.com/datho7561/a6be9caa9dbf2a69f097bd9a82dfa770 > results.txt 2>&1
          status=$?
          {
            echo
            echo "Script exit code: $status"
          } >> results.txt
          exit $status
        continue-on-error: true
      - name: Cat the results
        run: cat results.txt
      - name: Fail if regressing
        run: |
          if ! grep -q 'New failures:' results.txt; then
            echo "Diffing script did not produce a regression summary."
            exit 1
          fi
          grep 'New failures:' results.txt
          exit "$(sed -n 's/New failures: //p' results.txt)"
