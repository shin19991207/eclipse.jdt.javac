# Fast running checks for pull-requests

name: Pull-Request Checks
concurrency: 
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
  pull_request

jobs:
  check-merge-commits:
    name: Check for Merge Commits
    uses: eclipse-platform/eclipse.platform.releng.aggregator/.github/workflows/checkMergeCommits.yml@master
  check-compiles:
    name: Check if Code Compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Check if code compiles
        run: mvn --batch-mode --update-snapshots compile
  check-regressing-tests:
    name: Check for New Passes/Failures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Setup JBang
        uses: jbangdev/setup-jbang@312c53a4221283f9c8e4aa84d8261b82f0c680fb
      - name: Trust datho7561's Scripts
        run: jbang trust add https://gist.github.com/datho7561/
      - name: Run diffing script
        id: diff
        shell: bash
        run: |
          set +e
          set -o pipefail

          xvfb-run -a jbang https://gist.github.com/datho7561/a6be9caa9dbf2a69f097bd9a82dfa770 2>&1 | tee results.txt
          status=${PIPESTATUS[0]}

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

          {
            echo "### Diffing script"
            echo "- Exit code: $status"
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0

      - name: Upload diffing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diffing-script-log
          path: results.txt

      - name: Show log tail
        if: always()
        shell: bash
        run: |
          echo "Diffing script exit code: ${{ steps.diff.outputs.exit_code }}"
          tail -n 200 results.txt || true

      - name: Fail if regressing
        shell: bash
        run: |
          set -euo pipefail

          script_exit="${{ steps.diff.outputs.exit_code }}"
          new_failures="$(sed -n 's/^New failures: //p' results.txt | tail -n 1)"

          if [[ "$script_exit" != "0" ]]; then
            echo "::error::Diffing script exited with code $script_exit"
            exit 1
          fi

          if [[ -z "$new_failures" ]]; then
            echo "::error::Could not find 'New failures:' in results.txt"
            exit 1
          fi

          if (( new_failures > 0 )); then
            echo "::error::$new_failures new failures detected"
            exit 1
          fi

          echo "No new failures detected"
